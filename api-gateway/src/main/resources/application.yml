server:
  port: 9091

spring:
  application:
    name: api-gateway
  redis:
    host: localhost
    port: 6379
    # password: 你的密码 # 如果本地 Redis 没设密码，这行注释掉即可
    # database: 0
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        # 图书服务路由
        - id: book-service-route
          uri: lb://book-service
          predicates:
            - Path=/api/books/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: bookServiceCircuitBreaker
                fallbackUri: forward:/fallback/book-service
#            - name: RequestRateLimiter
#              args:
#                redis-rate-limiter.replenishRate: 10
#                redis-rate-limiter.burstCapacity: 20
#                key-resolver: "#{@userKeyResolver}"

        # 教师服务路由
        - id: teacher-service-route
          uri: lb://teacher-service
          predicates:
            - Path=/api/teacher/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: teacherServiceCircuitBreaker
                fallbackUri: forward:/fallback/teacher-service
#            - name: RequestRateLimiter
#              args:
#                redis-rate-limiter.replenishRate: 10
#                redis-rate-limiter.burstCapacity: 20
#                key-resolver: "#{@userKeyResolver}"

        # 课程分类服务路由
        - id: subject-service-route
          uri: lb://subject-service
          predicates:
            - Path=/api/subjects/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: subjectServiceCircuitBreaker
                fallbackUri: forward:/fallback/subject-service
#            - name: RequestRateLimiter
#              args:
#                redis-rate-limiter.replenishRate: 10
#                redis-rate-limiter.burstCapacity: 20
#                key-resolver: "#{@userKeyResolver}"

        # 文件服务路由（头像/Excel 上传 + VOD 凭证）
        - id: file-service-route
          uri: lb://file-service
          predicates:
            - Path=/api/upload/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: fileServiceCircuitBreaker
                fallbackUri: forward:/fallback/file-service
            # 注意：文件上传走的是 multipart，这里不挂 RequestRateLimiter 避免对大文件做 body 限速

        # VOD 凭证路由（走 file-service）
        - id: file-service-vod-route
          uri: lb://file-service
          predicates:
            - Path=/api/vod/**
          filters:
            - StripPrefix=1
            - name: CircuitBreaker
              args:
                name: fileServiceCircuitBreaker
                fallbackUri: forward:/fallback/file-service

        # 课程服务路由
        - id: course-service-route
          uri: lb://course-service
          predicates:
            - Path=/api/course/**
          filters:
            # 将 /api/course/<path> 重写为 /course-service/<path>，
            # 保留下游 spring.servlet.context-path 前缀
            - RewritePath=/api/course/(?<segment>.*), /course-service/$\{segment}
            - name: CircuitBreaker
              args:
                name: courseServiceCircuitBreaker
                fallbackUri: forward:/fallback/course-service
#            - name: RequestRateLimiter
#              args:
#                redis-rate-limiter.replenishRate: 10
#                redis-rate-limiter.burstCapacity: 20
#                key-resolver: "#{@userKeyResolver}"

        # 首页服务路由（banner + 首页聚合）
        - id: index-service-route
          uri: lb://index-service
          predicates:
            - Path=/api/index/**
          filters:
            - RewritePath=/api/index/(?<segment>.*), /index-service/$\{segment}
            - name: CircuitBreaker
              args:
                name: indexServiceCircuitBreaker
                fallbackUri: forward:/fallback/index-service
#            - name: RequestRateLimiter
#              args:
#                redis-rate-limiter.replenishRate: 20
#                redis-rate-limiter.burstCapacity: 40
#                key-resolver: "#{@userKeyResolver}"

        # 认证服务路由（登录 / 当前用户 / 登出）
        - id: auth-service-route
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
          filters:
            - RewritePath=/api/auth/(?<segment>.*), /auth-service/auth/$\{segment}
            - name: CircuitBreaker
              args:
                name: authServiceCircuitBreaker
                fallbackUri: forward:/fallback/auth-service

        # 服务提供者路由
        - id: service-provider-route
          uri: lb://service-provider
          predicates:
            - Path=/provider/**
          filters:
            - StripPrefix=1

        # 服务消费者路由
        - id: service-consumer-route
          uri: lb://service-consumer
          predicates:
            - Path=/consumer/**
          filters:
            - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    instance-id: ${spring.application.name}:${server.port}
    prefer-ip-address: true

resilience4j:
  circuitbreaker:
    instances:
      bookServiceCircuitBreaker:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
      teacherServiceCircuitBreaker:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
      subjectServiceCircuitBreaker:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
      fileServiceCircuitBreaker:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
      courseServiceCircuitBreaker:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
      indexServiceCircuitBreaker:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
      authServiceCircuitBreaker:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
  ratelimiter:
    instances:
      bookServiceRateLimiter:
        limitForPeriod: 10
        limitRefreshPeriod: 1s
        timeoutDuration: 0
        allowHealthIndicatorToFail: true
        registerHealthIndicator: true
        eventConsumerBufferSize: 100
      teacherServiceRateLimiter:
        limitForPeriod: 10
        limitRefreshPeriod: 1s
        timeoutDuration: 0
        allowHealthIndicatorToFail: true
        registerHealthIndicator: true
        eventConsumerBufferSize: 100
      subjectServiceRateLimiter:
        limitForPeriod: 10
        limitRefreshPeriod: 1s
        timeoutDuration: 0
        allowHealthIndicatorToFail: true
        registerHealthIndicator: true
        eventConsumerBufferSize: 100

# JWT 校验配置：secret 必须与 auth-service 一致，生产环境用 JWT_SECRET 环境变量覆盖
jwt:
  secret: ${JWT_SECRET:online-college-super-secret-key-please-change-in-prod-2026}
  issuer: online-college

management:
  endpoints:
    web:
      exposure:
        # 修正原先的拼写错误 gatway -> gateway
        include: health,info,metrics,circuitbreakers,ratelimiters,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: debug
    reactor.netty.http.client: debug

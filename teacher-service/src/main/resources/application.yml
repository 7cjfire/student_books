# 本地兜底配置（仅当 Nacos 不可用时生效）。
# 正常启动时以下内容全部由 Nacos 中的以下配置文件提供：
#   - common-config.yaml           (Jackson/日志/CORS/multipart 等)
#   - datasource-config.yaml       (数据源 + MyBatis-Plus 全局)
#   - teacher-service-config.yaml  (端口/Nacos discovery/业务规则/Resilience4j/Actuator/...)
#
# 这里只保留"在开发机上没连 Nacos 时也能启动到主框架"的最小兜底，
# 以及方便本地调试的日志级别。避免与 Nacos 重复导致字段含义不一致。

server:
  port: 8084
  servlet:
    context-path: /teacher-service

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    com.onlinecollege.teacher: debug
    org.springframework.web: info

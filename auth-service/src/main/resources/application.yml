server:
  port: 9000
  servlet:
    context-path: /auth-service

spring:
  application:
    name: auth-service

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/online_college?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    banner: false

# JWT 配置（与 api-gateway 的 jwt.secret 必须一致）
jwt:
  secret: ${JWT_SECRET:online-college-super-secret-key-please-change-in-prod-2026}
  issuer: online-college
  # token 有效期（分钟）
  expire-minutes: ${JWT_EXPIRE_MINUTES:720}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    instance-id: ${spring.application.name}:${server.port}
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  packages-to-scan: com.onlinecollege.auth.controller

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.onlinecollege.auth: debug

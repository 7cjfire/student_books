server:
  port: 8086
  servlet:
    context-path: /file-service

spring:
  application:
    name: file-service

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/online_college?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id
    banner: false

# 阿里云 OSS 配置
# 为避免 AccessKey 被提交到仓库，建议通过环境变量注入：
#   OSS_ENDPOINT / OSS_ACCESS_KEY_ID / OSS_ACCESS_KEY_SECRET / OSS_BUCKET
# 也支持在 enabled=false 时启用本地磁盘存储（oss.local.root 目录）
oss:
  enabled: ${OSS_ENABLED:false}
  endpoint: ${OSS_ENDPOINT:oss-cn-shanghai.aliyuncs.com}
  access-key-id: ${OSS_ACCESS_KEY_ID:}
  access-key-secret: ${OSS_ACCESS_KEY_SECRET:}
  bucket-name: ${OSS_BUCKET:online-college-avatar}
  # OSS 访问域名（用于拼接返回 URL），默认按 https://<bucket>.<endpoint> 组装；
  # 若绑定了自定义域名，可覆盖
  url-prefix: ${OSS_URL_PREFIX:}
  # 子目录
  avatar-dir: avatar/
  course-catalog-dir: course-catalog/
  # 本地兜底存储根目录（oss.enabled=false 时生效）
  local:
    root: ${OSS_LOCAL_ROOT:./uploads}
    # 本地模式下对外暴露的文件访问前缀
    url-prefix: ${OSS_LOCAL_URL_PREFIX:http://localhost:8086/file-service/local}

# 服务注册
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    instance-id: ${spring.application.name}:${server.port}
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  packages-to-scan: com.onlinecollege.file.controller

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.onlinecollege.file: debug
    org.springframework.web: info
